{% extends 'base.html' %}
{% block title %} Création page profile {% endblock %}

{% block content %}

{% if user.is_authenticated %}
  <h1>Création de la page profile de l'utilisateur</h1>
  <br /><br />

  <div class="form-group">
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Créer ma page profile</button>
    </form>
  </div>
{% endif %}


{% endblock %}
